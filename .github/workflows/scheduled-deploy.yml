name: Scheduled Deploy

on:
  schedule:
    # Every day at 6am PT (1pm UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
