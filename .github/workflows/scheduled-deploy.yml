name: Scheduled Deploy & Send

on:
  schedule:
    # Every Monday at 6am PT (1pm UTC / PDT)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish drafts (remove draft: true from today's content)
        run: |
          python3 scripts/publish_drafts.py
          if git diff --quiet; then
            echo "No drafts to publish today."
          else
            git config user.email "bot@agenticedge.tech"
            git config user.name "Agentic Edge Bot"
            git add web/src/content/
            git commit -m "Publish drafts for $(date +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Vercel Deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Wait for deploy to finish
        run: sleep 60

      - name: Send digest email (if today has one)
        run: |
          TODAY=$(date +%Y-%m-%d)
          DIGEST_FILE="web/src/content/digests/${TODAY}-digest.md"
          if [ ! -f "$DIGEST_FILE" ]; then
            echo "No digest file for ${TODAY}, skipping email."
            exit 0
          fi
          # Find featured_free article slug and title
          FEATURED_SLUG=""
          FEATURED_TITLE=""
          for f in web/src/content/premium/*.md; do
            if grep -q "featured_free: true" "$f"; then
              FEATURED_SLUG=$(basename "$f" .md)
              FEATURED_TITLE=$(grep '^title:' "$f" | head -1 | sed 's/title: *"//;s/"$//')
              break
            fi
          done
          # Pass content directly so Railway doesn't need filesystem access
          CONTENT=$(python3 -c "import sys, json; print(json.dumps(open('${DIGEST_FILE}').read()))")
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'api_key': '${{ secrets.DIGEST_SEND_KEY }}', 'content': open('${DIGEST_FILE}').read(), 'featured_title': '${FEATURED_TITLE}', 'featured_slug': '${FEATURED_SLUG}'}))")
          response=$(curl -s -X POST "${{ secrets.RAILWAY_API_URL }}/api/digest/send-latest" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$response"
