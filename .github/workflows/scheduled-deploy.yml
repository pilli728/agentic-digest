name: Scheduled Monday Deploy

on:
  schedule:
    # Every Monday at 6am PT (1pm UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
