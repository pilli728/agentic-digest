name: Scheduled Deploy & Send

on:
  schedule:
    # Every day at 1pm PT (8pm UTC)
    - cron: '0 20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish drafts (remove draft: true from today's content)
        run: |
          python3 scripts/publish_drafts.py
          if git diff --quiet; then
            echo "No drafts to publish today."
          else
            git config user.email "bot@agenticedge.tech"
            git config user.name "Agentic Edge Bot"
            git add web/src/content/
            git commit -m "Publish drafts for $(date +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Vercel Deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Wait for deploy to finish
        run: sleep 60

      - name: Send digest email (if today has one)
        run: |
          response=$(curl -s -X POST "${{ secrets.RAILWAY_API_URL }}/api/digest/send-latest" \
            -H "Content-Type: application/json" \
            -d "{\"api_key\": \"${{ secrets.DIGEST_SEND_KEY }}\"}")
          echo "$response"
