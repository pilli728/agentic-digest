name: Scheduled Deploy & Send

on:
  schedule:
    # Every Monday at 6am PT (1pm UTC / PDT)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish drafts (remove draft:true from today's content)
        run: |
          python3 scripts/publish_drafts.py
          if git diff --quiet; then
            echo "No drafts to publish today."
          else
            git config user.email "bot@agenticedge.tech"
            git config user.name "Agentic Edge Bot"
            git add web/src/content/
            git commit -m "Publish drafts for $(date +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Vercel Deploy
        run: curl -s -X POST "$VERCEL_DEPLOY_HOOK"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Wait for deploy to finish
        run: sleep 60

      - name: Send digest email (if today has one)
        env:
          DIGEST_SEND_KEY: ${{ secrets.DIGEST_SEND_KEY }}
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d 2>/dev/null || date -v-1d +%Y-%m-%d)

          # Find digest file (today or yesterday to handle UTC offset)
          DIGEST_FILE=""
          for d in "$TODAY" "$YESTERDAY"; do
            f="web/src/content/digests/${d}-digest.md"
            if [ -f "$f" ]; then
              DIGEST_FILE="$f"
              break
            fi
          done

          if [ -z "$DIGEST_FILE" ]; then
            echo "No digest file for ${TODAY} or ${YESTERDAY}, skipping email."
            exit 0
          fi

          echo "Sending digest: $DIGEST_FILE"

          # Find featured_free article
          FEATURED_SLUG=""
          FEATURED_TITLE=""
          for f in web/src/content/premium/*.md; do
            if grep -q "featured_free: true" "$f"; then
              FEATURED_SLUG=$(basename "$f" .md)
              FEATURED_TITLE=$(grep '^title:' "$f" | head -1 | sed 's/title: *"//;s/"$//')
              break
            fi
          done

          # Build JSON payload via Python (safe quoting)
          python3 - <<PYEOF
          import json, urllib.request, urllib.error, os, sys

          content = open("$DIGEST_FILE").read()
          payload = json.dumps({
              "api_key": os.environ["DIGEST_SEND_KEY"],
              "content": content,
              "featured_title": "$FEATURED_TITLE",
              "featured_slug": "$FEATURED_SLUG",
          }).encode()

          req = urllib.request.Request(
              os.environ["RAILWAY_API_URL"] + "/api/digest/send-latest",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=60) as r:
                  print(r.read().decode())
          except urllib.error.HTTPError as e:
              print("Error:", e.code, e.read().decode())
              sys.exit(1)
          PYEOF
