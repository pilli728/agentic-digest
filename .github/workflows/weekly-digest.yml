name: Weekly Digest Generator

on:
  schedule:
    - cron: '0 7 * * 0'  # Sunday 7am UTC = Saturday 11pm PT
  workflow_dispatch:  # manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the commit back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git push works
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dateutil

      - name: Run digest generator
        run: python scripts/weekly_digest_generator.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_USER_ID: ${{ secrets.TWITTER_USER_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          REPO_PATH: ${{ github.workspace }}
